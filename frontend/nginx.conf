server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html (Angular Router assume o roteamento).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend (ASP.NET Core), acessivel pelo nome do servico no Compose.
    # As rotas do backend ja incluem o prefixo /api (ex.: AuthController -> api/v1/auth/login),
    # entao o caminho e repassado sem reescrever.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Sem isso o nginx usa o default de 1 MB e rejeita com 413 antes da
        # requisicao chegar no backend - precisa acompanhar o limite de anexos
        # (Upload:MaxFileSizeBytes / Kestrel MaxRequestBodySize em Program.cs).
        client_max_body_size 105m;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
