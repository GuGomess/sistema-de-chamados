name: sistema-de-chamados

services:
  db:
    image: postgres:16-alpine
    container_name: chamados-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chamados}
      POSTGRES_USER: ${POSTGRES_USER:-chamados}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chamados}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chamados} -d ${POSTGRES_DB:-chamados}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: chamados-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      Jwt__Key: ${Jwt__Key}
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}
      Jwt__ExpiresMinutes: ${Jwt__ExpiresMinutes:-60}
    ports:
      - "${API_PORT:-5000}:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: chamados-frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-4200}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
